name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check shell
        run: bash -n tmux-mas install.sh
      - name: Check help
        run: ./tmux-mas --help
      - name: Check Python
        run: python -m py_compile runtime/run_scenario.py tests/smoke_parse.py
      - name: Parse scenarios
        run: python tests/smoke_parse.py
