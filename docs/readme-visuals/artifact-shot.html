<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tmux-mas artifact screenshot</title>
    <style>
      :root {
        --ink: #101827;
        --muted: #627084;
        --line: #d7e0ee;
        --bg: #f6f9fc;
        --panel: #ffffff;
        --accent: #7c3aed;
        --blue: #0ea5e9;
        --green: #16a34a;
        --red: #b91c1c;
        --orange: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        min-height: 760px;
        color: var(--ink);
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .page {
        min-height: 760px;
        padding: 22px;
        background:
          linear-gradient(135deg, rgba(124, 58, 237, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(14, 165, 233, 0.14), transparent 36%),
          var(--bg);
      }

      .shot {
        min-height: 704px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 20px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
      }

      .label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 8px 13px;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .without .label {
        color: var(--red);
        background: #fee2e2;
      }

      .with .label {
        color: #166534;
        background: #dcfce7;
      }

      .brand {
        display: none;
        color: var(--accent);
        font: 900 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .content {
        padding: 22px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .muted {
        color: var(--muted);
      }

      .landing-plain {
        padding: 28px;
        color: #1f2937;
      }

      .landing-plain h1 {
        font-size: 38px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .plain-boxes {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 34px;
      }

      .plain-box {
        min-height: 142px;
        border: 2px dashed #cbd5e1;
        border-radius: 10px;
        padding: 18px;
        background: #f8fafc;
      }

      .plain-button {
        display: inline-block;
        margin-top: 18px;
        border-radius: 7px;
        background: #334155;
        color: white;
        padding: 12px 18px;
        font-weight: 800;
      }

      .landing-rich {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px;
        min-height: 610px;
        padding: 24px;
        background:
          radial-gradient(circle at 88% 12%, rgba(14, 165, 233, 0.18), transparent 24%),
          #ffffff;
      }

      .landing-rich h1 {
        max-width: 820px;
        font-size: 38px;
        line-height: 0.98;
        letter-spacing: 0;
        margin-bottom: 20px;
      }

      .landing-rich p {
        max-width: 760px;
        color: #475569;
        font-size: 19px;
        line-height: 1.5;
      }

      .cta-row {
        display: flex;
        gap: 12px;
        margin: 28px 0;
      }

      .cta {
        border-radius: 10px;
        padding: 13px 18px;
        font-weight: 900;
      }

      .cta.primary {
        color: #fff;
        background: #111827;
      }

      .cta.secondary {
        color: #111827;
        border: 1px solid #cbd5e1;
        background: #fff;
      }

      .hero-card {
        align-self: center;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        background: #0f172a;
        padding: 18px;
        color: white;
      }

      .hero-card-top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 18px;
        color: #93c5fd;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .metric {
        min-height: 96px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        padding: 16px;
      }

      .metric b {
        display: block;
        font-size: 26px;
      }

      .art-plain {
        display: grid;
        place-items: center;
        min-height: 650px;
        background: #fff;
      }

      .art-plain canvas,
      .art-rich canvas {
        display: block;
      }

      .art-rich {
        display: grid;
        grid-template-columns: 1fr;
        min-height: 610px;
        background: #08111f;
        color: white;
      }

      .art-copy {
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.06);
      }

      .art-copy h1 {
        font-size: 24px;
        line-height: 1;
      }

      .art-rich canvas {
        width: 100%;
        height: 500px;
      }

      .swatches {
        display: flex;
        gap: 8px;
        margin: 20px 0;
      }

      .swatch {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.45);
      }

      .travel-plain,
      .api-plain {
        padding: 34px;
        background: #fff;
        min-height: 650px;
      }

      .travel-plain h1,
      .api-plain h1 {
        font-size: 38px;
      }

      .travel-plain ul {
        font-size: 20px;
        line-height: 1.7;
      }

      .travel-rich {
        min-height: 610px;
        padding: 26px;
        background:
          linear-gradient(90deg, rgba(15, 23, 42, 0.06), transparent),
          #fff;
      }

      .travel-head {
        display: block;
        border-bottom: 1px solid var(--line);
        padding-bottom: 22px;
        margin-bottom: 22px;
      }

      .travel-head h1 {
        font-size: 32px;
        line-height: 1;
      }

      .pill-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        border-radius: 999px;
        background: #f1f5f9;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 800;
      }

      .days {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .day {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        background: #ffffff;
      }

      .day h3 {
        margin-bottom: 8px;
        font-size: 18px;
      }

      .day p {
        color: #475569;
        font-size: 14px;
        line-height: 1.45;
      }

      .api-plain pre {
        overflow: hidden;
        border-radius: 12px;
        background: #0f172a;
        color: #d1d5db;
        padding: 18px;
        font-size: 15px;
        line-height: 1.45;
      }

      .api-rich {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 610px;
        background: #fff;
      }

      .api-nav {
        border-right: 1px solid var(--line);
        background: #f8fafc;
        padding: 22px;
      }

      .api-nav h1 {
        font-size: 28px;
      }

      .nav-item {
        margin: 10px 0;
        border-radius: 10px;
        padding: 11px 12px;
        background: #fff;
        border: 1px solid var(--line);
        font-weight: 800;
      }

      .api-main {
        padding: 22px;
      }

      .endpoint {
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 14px;
        padding: 16px;
      }

      .method {
        display: inline-block;
        min-width: 64px;
        border-radius: 8px;
        padding: 6px 9px;
        color: white;
        background: #2563eb;
        font: 900 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-align: center;
      }

      .path {
        margin-left: 10px;
        font: 800 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section id="shot" class="shot"></section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const kind = params.get("kind") || "landing";
      const mode = params.get("mode") || "without";
      const shot = document.querySelector("#shot");

      function topbar(title) {
        const label = mode === "with" ? "Using tmux-mas" : "Without tmux-mas";
        return `
          <div class="topbar ${mode}">
            <span class="label">${label}</span>
            <strong>${title}</strong>
            <span class="brand">tmux-mas</span>
          </div>
        `;
      }

      function landing() {
        if (mode === "without") {
          return `
            ${topbar("Landing Page")}
            <div class="landing-plain">
              <h1>AI task tool for teams</h1>
              <p class="muted">It helps you do work faster. It has agents and collaboration features.</p>
              <span class="plain-button">Get Started</span>
              <div class="plain-boxes">
                <div class="plain-box"><h3>Fast</h3><p>Make things faster.</p></div>
                <div class="plain-box"><h3>Smart</h3><p>Use AI agents.</p></div>
                <div class="plain-box"><h3>Easy</h3><p>Works for everyone.</p></div>
              </div>
            </div>
          `;
        }

        return `
          ${topbar("Landing Page")}
          <div class="landing-rich">
            <div>
              <h1>Run agent teams you can actually watch.</h1>
              <p>Launch reproducible multi-agent rooms from YAML. Each role gets a pane, tools, and a visible handoff trail.</p>
              <div class="cta-row">
                <span class="cta primary">Run a scenario</span>
                <span class="cta secondary">View examples</span>
              </div>
              <div class="pill-row">
                <span class="pill">tmux required</span>
                <span class="pill">no cmux dependency</span>
                <span class="pill">codex / claude / gemini</span>
              </div>
            </div>
            <div class="hero-card">
              <div class="hero-card-top"><span>workspace: landing-page-team</span><span>4 panes</span></div>
              <div class="metric-grid">
                <div class="metric"><b>Lead</b><span>frames scope</span></div>
                <div class="metric"><b>Design</b><span>owns UX</span></div>
                <div class="metric"><b>Dev</b><span>ships HTML</span></div>
                <div class="metric"><b>QA</b><span>checks output</span></div>
              </div>
            </div>
          </div>
        `;
      }

      function art() {
        if (mode === "without") {
          return `
            ${topbar("Generative Art")}
            <div class="art-plain">
              <canvas id="art" width="760" height="540"></canvas>
            </div>
          `;
        }

        return `
          ${topbar("Generative Art")}
          <div class="art-rich">
            <canvas id="art" width="820" height="650"></canvas>
            <aside class="art-copy">
              <h1>Signal Bloom</h1>
              <p class="muted">A critic-guided canvas study with depth, palette, and motion rules.</p>
              <div class="swatches">
                <span class="swatch" style="background:#7c3aed"></span>
                <span class="swatch" style="background:#0ea5e9"></span>
                <span class="swatch" style="background:#22c55e"></span>
                <span class="swatch" style="background:#f97316"></span>
              </div>
              <p>Curator selects direction. Artist designs the system. Engineer implements. Critic forces one improvement pass.</p>
            </aside>
          </div>
        `;
      }

      function travel() {
        if (mode === "without") {
          return `
            ${topbar("Travel Itinerary")}
            <div class="travel-plain">
              <h1>Tokyo Trip</h1>
              <p class="muted">Four days for food, design, and records.</p>
              <ul>
                <li>Day 1: Shibuya and dinner.</li>
                <li>Day 2: Museums and shopping.</li>
                <li>Day 3: Record stores and coffee.</li>
                <li>Day 4: Free time and airport.</li>
              </ul>
            </div>
          `;
        }

        return `
          ${topbar("Travel Itinerary")}
          <div class="travel-rich">
            <div class="travel-head">
              <div>
                <h1>Tokyo: Food, Design, Records</h1>
                <p class="muted">Four realistic days with neighborhood pacing, rainy-day swaps, and print-friendly structure.</p>
              </div>
              <div class="pill-row">
                <span class="pill">4 days</span>
                <span class="pill">rain safe</span>
                <span class="pill">transit sane</span>
                <span class="pill">print ready</span>
              </div>
            </div>
            <div class="days">
              <div class="day"><h3>Day 1: Shibuya</h3><p>Arrive, settle, small plates near Tomigaya, early night.</p></div>
              <div class="day"><h3>Day 2: Aoyama</h3><p>Design stores, architecture walk, Omotesando coffee, rainy museum swap.</p></div>
              <div class="day"><h3>Day 3: Shimokita</h3><p>Record stores by cluster, lunch buffer, listening bar reservation.</p></div>
              <div class="day"><h3>Day 4: Kiyosumi</h3><p>Light morning, luggage-aware route, final cafe before airport rail.</p></div>
            </div>
          </div>
        `;
      }

      function api() {
        if (mode === "without") {
          return `
            ${topbar("API Spec")}
            <div class="api-plain">
              <h1>API draft</h1>
              <pre>POST /run
GET /sessions
GET /sessions/:id
DELETE /sessions/:id

Errors:
- 400 bad request
- 500 failed

Example:
curl -X POST /run</pre>
            </div>
          `;
        }

        return `
          ${topbar("API Spec")}
          <div class="api-rich">
            <nav class="api-nav">
              <h1>tmux-mas API</h1>
              <p class="muted">Launch, watch, and stop visible agent sessions.</p>
              <div class="nav-item">Sessions</div>
              <div class="nav-item">Runs</div>
              <div class="nav-item">Events</div>
              <div class="nav-item">Errors</div>
            </nav>
            <div class="api-main">
              <div class="endpoint"><span class="method">POST</span><span class="path">/v1/runs</span><p class="muted">Create a run from a scenario, runner override, and working directory.</p></div>
              <div class="endpoint"><span class="method">GET</span><span class="path">/v1/runs/{id}/events</span><p class="muted">Stream status, agent messages, exit markers, and artifact paths.</p></div>
              <div class="endpoint"><span class="method">POST</span><span class="path">/v1/runs/{id}/stop</span><p class="muted">Gracefully stop a tmux session and preserve run metadata.</p></div>
              <div class="endpoint"><span class="method" style="background:#dc2626">ERR</span><span class="path">typed failures</span><p class="muted">Scenario not found, runner unavailable, tmux missing, pane exited, invalid submit key.</p></div>
            </div>
          </div>
        `;
      }

      const renderers = { landing, art, travel, api };
      shot.classList.add(mode);
      shot.innerHTML = (renderers[kind] || landing)();

      if (kind === "art") {
        const canvas = document.querySelector("#art");
        const ctx = canvas.getContext("2d");
        if (mode === "without") {
          ctx.fillStyle = "#f8fafc";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#94a3b8";
          for (let i = 0; i < 32; i += 1) {
            ctx.beginPath();
            ctx.arc(80 + (i % 8) * 86, 80 + Math.floor(i / 8) * 100, 24, 0, Math.PI * 2);
            ctx.fill();
          }
        } else {
          const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
          g.addColorStop(0, "#0f172a");
          g.addColorStop(0.5, "#172554");
          g.addColorStop(1, "#052e2b");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < 140; i += 1) {
            const x = canvas.width / 2 + Math.cos(i * 0.31) * i * 3.1;
            const y = canvas.height / 2 + Math.sin(i * 0.29) * i * 2.1;
            const r = 10 + (i % 17);
            ctx.beginPath();
            ctx.fillStyle = `hsla(${190 + i * 2.2}, 88%, ${54 + (i % 20)}%, 0.34)`;
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.strokeStyle = "rgba(255,255,255,0.42)";
          ctx.lineWidth = 2;
          for (let i = 0; i < 22; i += 1) {
            ctx.beginPath();
            ctx.ellipse(canvas.width / 2, canvas.height / 2, 60 + i * 16, 34 + i * 9, i * 0.13, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      }
    </script>
  </body>
</html>
